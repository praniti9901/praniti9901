name: Update Profile Stats

on:
  schedule:
    # Every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README timestamp
        run: |
          TODAY=$(date +"%Y-%m-%d %H:%M:%S UTC")
          echo "## Last updated: $TODAY" > last_update.md
          git config user.name "praniti9901"
          git config user.email "pranitimohite3101@gmail.com"
          git add last_update.md
          git commit -m "chore: auto-update timestamp $TODAY" || echo "No changes to commit"
          git push
